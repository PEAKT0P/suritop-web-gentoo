# ModSecurity CRS Exclusions for Nextcloud
# Place this file in /etc/nginx/modsecurity/nextcloud-exclusions.conf

# Allow WebDAV methods (PROPFIND, PROPPATCH, MKCOL, COPY, MOVE, LOCK, UNLOCK, REPORT)
SecRuleRemoveById 911100

# Nextcloud remote.php/webdav - disable body inspection for file uploads
SecRule REQUEST_URI "@beginsWith /remote.php/webdav" \
    "id:10000,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920170,\
    ctl:ruleRemoveById=920171,\
    ctl:ruleRemoveById=920272,\
    ctl:ruleRemoveById=920273,\
    ctl:ruleRemoveById=921110,\
    ctl:ruleRemoveById=921120,\
    ctl:ruleRemoveById=930100,\
    ctl:ruleRemoveById=930110,\
    ctl:ruleRemoveById=930120,\
    ctl:ruleRemoveById=941100,\
    ctl:ruleRemoveById=941110,\
    ctl:ruleRemoveById=941160,\
    ctl:ruleRemoveById=942100,\
    ctl:ruleRemoveById=942110,\
    ctl:ruleRemoveById=942120,\
    ctl:ruleRemoveById=942130,\
    ctl:ruleRemoveById=942150,\
    ctl:ruleRemoveById=942180,\
    ctl:ruleRemoveById=942200,\
    ctl:ruleRemoveById=942260,\
    ctl:ruleRemoveById=942340,\
    ctl:ruleRemoveById=942370,\
    ctl:ruleRemoveById=942430,\
    ctl:ruleRemoveById=942440,\
    ctl:ruleRemoveById=949110,\
    ctl:requestBodyAccess=Off"

# Nextcloud remote.php/dav (CalDAV, CardDAV, file sync)
SecRule REQUEST_URI "@beginsWith /remote.php/dav" \
    "id:10001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920170,\
    ctl:ruleRemoveById=920171,\
    ctl:ruleRemoveById=920272,\
    ctl:ruleRemoveById=920273,\
    ctl:ruleRemoveById=921110,\
    ctl:ruleRemoveById=921120,\
    ctl:ruleRemoveById=930100,\
    ctl:ruleRemoveById=930110,\
    ctl:ruleRemoveById=930120,\
    ctl:ruleRemoveById=941100,\
    ctl:ruleRemoveById=941110,\
    ctl:ruleRemoveById=941160,\
    ctl:ruleRemoveById=942100,\
    ctl:ruleRemoveById=942110,\
    ctl:ruleRemoveById=942120,\
    ctl:ruleRemoveById=942130,\
    ctl:ruleRemoveById=942150,\
    ctl:ruleRemoveById=942180,\
    ctl:ruleRemoveById=942200,\
    ctl:ruleRemoveById=942260,\
    ctl:ruleRemoveById=942340,\
    ctl:ruleRemoveById=942370,\
    ctl:ruleRemoveById=942430,\
    ctl:ruleRemoveById=942440,\
    ctl:ruleRemoveById=949110,\
    ctl:requestBodyAccess=Off"

# Nextcloud OCS API and CSRF tokens
SecRule REQUEST_URI "@beginsWith /ocs/" \
    "id:10002,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920170,\
    ctl:ruleRemoveById=920273,\
    ctl:ruleRemoveById=941100,\
    ctl:ruleRemoveById=941110,\
    ctl:ruleRemoveById=942100,\
    ctl:ruleRemoveById=942110,\
    ctl:ruleRemoveById=942120,\
    ctl:ruleRemoveById=949110"

# Nextcloud index.php (main frontend, login, CSRF)
SecRule REQUEST_URI "@beginsWith /index.php" \
    "id:10003,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920273,\
    ctl:ruleRemoveById=941100,\
    ctl:ruleRemoveById=941110,\
    ctl:ruleRemoveById=942100,\
    ctl:ruleRemoveById=942110,\
    ctl:ruleRemoveById=949110"

# Nextcloud cron.php
SecRule REQUEST_URI "@streq /cron.php" \
    "id:10004,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920273,\
    ctl:ruleRemoveById=949110"

# Nextcloud Signaling (HPB)
SecRule REQUEST_URI "@beginsWith /standalone-signaling" \
    "id:10005,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920170,\
    ctl:ruleRemoveById=920273,\
    ctl:ruleRemoveById=949110,\
    ctl:requestBodyAccess=Off"

# Nextcloud apps API endpoints
SecRule REQUEST_URI "@beginsWith /apps/" \
    "id:10006,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920273,\
    ctl:ruleRemoveById=941100,\
    ctl:ruleRemoveById=941110,\
    ctl:ruleRemoveById=942100,\
    ctl:ruleRemoveById=942110,\
    ctl:ruleRemoveById=949110"


# Attack Map - allow ssh parameter on router.denjik.ru
SecRule REQUEST_URI "@beginsWith /attack_map.php" \
    "id:10110,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=932250"

# Nextcloud sends text/plain for WebDAV PROPFIND
SecRule REQUEST_URI "@beginsWith /remote.php" \
    "id:10011,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920420"

# Nextcloud: allow all methods (PROPFIND, DELETE, etc)
SecRule REQUEST_URI "@beginsWith /remote.php" \
    "id:10012,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=911100"

SecRule REQUEST_URI "@beginsWith /ocs/" \
    "id:10013,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=911100"
