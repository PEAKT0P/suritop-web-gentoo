# ModSecurity CRS Exclusions for MODX Revolution
# Put in /etc/nginx/modsecurity/modx-exclusions.conf
# Include from the same place as nextcloud-exclusions.conf

# /connectors/index.php — AJAX endpoint админки.
# Через него сохраняются шаблоны, чанки, сниппеты, плагины —
# в ARGS:content легит HTML/JS/PHP/CSS код. CRS считает это атакой.
SecRule REQUEST_URI "@beginsWith /connectors/" \
